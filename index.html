  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

,.05) 2px,transparent 2px);background-size:24px 24px;\"><\u002Fdiv>\n    <div style=\"position:relative;\">\n      <div style=\"font-size:13px;letter-spacing:3px;color:#f3dea6;font-weight:800;margin-bottom:6px;\">🐆 GENERAL MANAGER ASSIGNMENT 🐆<\u002Fdiv>\n      <div style=\"font-family:'Bungee',sans-serif;font-size:clamp(34px,6vw,62px);line-height:1;color:#fffaf0;text-shadow:0 3px 0 #143524;\">FUR REAL<\u002Fdiv>\n      <div style=\"font-family:'Bungee',sans-serif;font-size:clamp(15px,2.4vw,24px);letter-spacing:6px;color:#e3a72f;margin-top:4px;\">WILDLIFE PARK<\u002Fdiv>\n      <div style=\"margin-top:12px;font-size:15px;color:#d7e6d2;font-weight:600;\">Unit 2 · Ratios, Proportional Relationships &amp; Unit Rates<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <nav style=\"position:sticky;top:0;z-index:20;background:rgba(236,227,207,.95);backdrop-filter:blur(6px);border-bottom:2px solid #d8c9a6;padding:10px 12px;\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-wrap:wrap;gap:8px;justify-content:center;\">\n      <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"10\">\n        <button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">\n          <span style=\"font-size:16px;\">{{ t.icon }}<\u002Fspan>\n          <span>{{ t.label }}<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <main style=\"max-width:1000px;margin:0 auto;padding:26px 18px 60px;\">\n\n    <!-- WELCOME -->\n    <sc-if value=\"{{ showWelcome }}\" hint-placeholder-val=\"{{ true }}\">\n      <div>\n        <image-slot id=\"welcome-hero\" placeholder=\"Drop a wide photo of your zoo or favorite animals here 🦁\" shape=\"rounded\" radius=\"18\" style=\"width:100%;height:240px;display:block;margin-bottom:18px;border:2px solid #d8c9a6;box-shadow:0 6px 0 #d8c9a6;background:#f3ecd9;\"><\u002Fimage-slot>\n        <div style=\"background:#fffdf6;border:2px solid #d8c9a6;border-radius:18px;padding:26px 26px 22px;box-shadow:0 6px 0 #d8c9a6;\">\n          <h1 style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:30px;margin:0 0 6px;color:#21503a;\">Welcome, General Manager! 🎉<\u002Fh1>\n          <p style=\"font-size:17px;line-height:1.6;margin:0 0 14px;\">\n            You've just been hired to run <strong>Fur Real Wildlife Park<\u002Fstrong>. Every department needs a sharp manager who can work with\n            <strong>ratios, unit rates, and proportional reasoning<\u002Fstrong>. Click through the 8 departments using the tabs above. Each one gives you\n            real park data — your job is to crunch the numbers.\n          <\u002Fp>\n          <div style=\"background:#eef5ea;border:1px dashed #5a9367;border-radius:12px;padding:14px 16px;font-size:15.5px;line-height:1.6;\">\n            <strong style=\"color:#21503a;\">📋 How this works<\u002Fstrong>\n            <ol style=\"margin:8px 0 0;padding-left:20px;\">\n              <li>Read the data tables in each department.<\u002Fli>\n              <li>Show <strong>all your work on your paper worksheet<\u002Fstrong> — that's what gets turned in.<\u002Fli>\n              <li>Type your final answer into the box and press <strong>Check<\u002Fstrong> to see if you nailed it. ✓<\u002Fli>\n            <\u002Fol>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <h2 style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:20px;color:#21503a;margin:26px 0 12px;\">Your 8 Departments<\u002Fh2>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;\">\n          <sc-for list=\"{{ depts }}\" as=\"d\" hint-placeholder-count=\"8\">\n            <button onclick=\"{{ d.onClick }}\" style=\"text-align:left;cursor:pointer;background:#fffdf6;border:2px solid #d8c9a6;border-radius:14px;padding:14px 16px;display:flex;gap:12px;align-items:center;font-family:inherit;\">\n              <span style=\"font-size:26px;\">{{ d.icon }}<\u002Fspan>\n              <span>\n                <span style=\"display:block;font-size:12px;font-weight:800;color:#c05f2c;letter-spacing:.5px;\">{{ d.dept }}<\u002Fspan>\n                <span style=\"display:block;font-family:'Fredoka',sans-serif;font-weight:600;font-size:16px;color:#2c2417;\">{{ d.short }}<\u002Fspan>\n              <\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- DEPARTMENT -->\n    <sc-if value=\"{{ showDept }}\" hint-placeholder-val=\"{{ false }}\">\n      <div>\n        <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:8px;flex-wrap:wrap;\">\n          <div style=\"font-size:42px;line-height:1;\">{{ activeDept.icon }}<\u002Fdiv>\n          <div style=\"flex:1;min-width:180px;\">\n            <div style=\"font-size:13px;font-weight:800;color:#c05f2c;letter-spacing:1px;\">{{ activeDept.dept }}<\u002Fdiv>\n            <h1 style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:28px;margin:2px 0 0;color:#21503a;\">{{ activeDept.name }}<\u002Fh1>\n          <\u002Fdiv>\n          <image-slot id=\"{{ activeDept.photoId }}\" placeholder=\"{{ activeDept.photoHint }}\" shape=\"rounded\" radius=\"14\" style=\"width:200px;height:124px;flex:none;border:2px solid #d8c9a6;background:#f3ecd9;\"><\u002Fimage-slot>\n        <\u002Fdiv>\n        <p style=\"font-size:16px;line-height:1.55;color:#5a4f3a;margin:6px 0 20px;\">{{ activeDept.intro }}<\u002Fp>\n\n        <!-- DATA TABLES (prebuilt element — bundler-safe) -->\n        <div style=\"margin-bottom:24px;\">{{ activeDept.tablesEl }}<\u002Fdiv>\n\n        <!-- QUESTIONS -->\n        <div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px;\">\n          <h2 style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:19px;color:#21503a;margin:0;\">✏️ Manager Tasks<\u002Fh2>\n          <div style=\"display:flex;align-items:center;gap:12px;\">\n            <span style=\"font-weight:800;color:#3f7d4e;font-size:14px;\">{{ activeDept.progress }}<\u002Fspan>\n            <button onclick=\"{{ activeDept.onClear }}\" style=\"cursor:pointer;background:none;border:1px solid #c9b896;border-radius:20px;color:#8a7a59;font-weight:700;font-size:12.5px;padding:5px 12px;font-family:inherit;\">Clear answers<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;flex-direction:column;gap:14px;\">\n          <sc-for list=\"{{ activeDept.questions }}\" as=\"q\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fffdf6;border:2px solid #d8c9a6;border-radius:14px;padding:16px 18px;\">\n              <div style=\"display:flex;gap:12px;align-items:flex-start;\">\n                <span style=\"flex:none;width:28px;height:28px;border-radius:50%;background:#e3a72f;color:#1d4a35;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center;font-family:'Fredoka',sans-serif;\">{{ q.num }}<\u002Fspan>\n                <div style=\"flex:1;\">\n                  <p style=\"margin:2px 0 0;font-size:16.5px;line-height:1.5;font-weight:600;\">{{ q.prompt }}<\u002Fp>\n                  <sc-if value=\"{{ q.hint }}\" hint-placeholder-val=\"{{ false }}\">\n                    <p style=\"margin:6px 0 0;font-size:13.5px;color:#9a7b3e;font-weight:700;\">💡 Hint: {{ q.hint }}<\u002Fp>\n                  <\u002Fsc-if>\n                  <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px;\">\n                    <input value=\"{{ q.value }}\" onchange=\"{{ q.onChange }}\" onkeydown=\"{{ q.onKey }}\" placeholder=\"Your answer\" style=\"width:140px;font-family:inherit;font-size:16px;font-weight:700;padding:9px 12px;border:2px solid #d8c9a6;border-radius:10px;background:#fff;color:#2c2417;outline:none;\">\n                    <span style=\"font-size:14px;color:#8a7a59;font-weight:700;\">{{ q.unit }}<\u002Fspan>\n                    <button onclick=\"{{ q.onCheck }}\" style=\"cursor:pointer;background:#3f7d4e;color:#fff;border:none;border-radius:10px;font-family:'Fredoka',sans-serif;font-weight:600;font-size:15px;padding:9px 20px;box-shadow:0 3px 0 #2a5836;\">Check<\u002Fbutton>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ q.isCorrect }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"margin-top:12px;display:inline-block;background:#e4f3df;border:1.5px solid #5a9367;color:#236b3a;font-weight:800;font-size:14.5px;padding:7px 14px;border-radius:10px;animation:pop .3s ease;\">✓ Correct! Great managing. 🎉<\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ q.isWrong }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"margin-top:12px;display:inline-block;background:#fbe6dc;border:1.5px solid #d88c63;color:#b04a1f;font-weight:800;font-size:14.5px;padding:7px 14px;border-radius:10px;animation:pop .3s ease;\">✗ Not quite — recheck your work and try again.<\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- WRAP-UP -->\n    <sc-if value=\"{{ showWrap }}\" hint-placeholder-val=\"{{ false }}\">\n      <div>\n        <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:14px;\">\n          <div style=\"font-size:42px;\">🏆<\u002Fdiv>\n          <h1 style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:28px;margin:0;color:#21503a;\">Zoo Manager Wrap-Up<\u002Fh1>\n        <\u002Fdiv>\n        <div style=\"background:#fffdf6;border:2px solid #d8c9a6;border-radius:16px;padding:24px;box-shadow:0 6px 0 #d8c9a6;\">\n          <p style=\"font-size:17px;line-height:1.6;margin:0 0 16px;\">You've run the whole park! Finish strong with this reflection — write your answer on your worksheet.<\u002Fp>\n          <div style=\"background:#eef5ea;border-left:5px solid #e3a72f;border-radius:8px;padding:16px 18px;font-size:16.5px;line-height:1.6;font-weight:600;color:#2c2417;\">\n            Which department surprised you the most, and why? Use at least one <strong>ratio<\u002Fstrong> or <strong>unit rate<\u002Fstrong> in your answer.\n          <\u002Fdiv>\n          <p style=\"margin:18px 0 0;font-size:15px;color:#8a7a59;font-weight:700;\">📄 Don't forget to turn in your completed worksheet in Google Classroom!<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n\n  <footer style=\"text-align:center;padding:20px;font-size:13px;color:#9a8c6c;font-weight:700;border-top:2px solid #d8c9a6;\">\n    Fur Real Wildlife Park · North Johnston Middle School\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { tab: 'welcome', answers: {}, status: {} };\n\n  depts = [\n    { id:'d1', dept:'Department 1', short:'Food', icon:'🍖', name:'Food & Nutrition',\n      intro:'Your animals are hungry! Use the batch costs and feeding data to figure out unit rates and how much food the park needs each day.',\n      tables:[\n        { title:'Food Batch Costs', headers:['Animal','Batch Cost','Servings in Batch'],\n          rows:[['🐆 Jaguar','$48','6'],['🦒 Giraffe','$90','5'],['🐧 Penguin','$18','9'],['🐘 Elephant','$120','8']] },\n        { title:'Daily Servings Needed', headers:['Animal','Servings / Animal / Day','# of Animals'],\n          rows:[['🐧 Penguin','3','12'],['🐘 Elephant','4','3']] },\n        { title:'Food Cost by Weight', headers:['Animal','Cost','Pounds of Food'],\n          rows:[['🐆 Jaguar','$24','8 lb'],['🐘 Elephant','$60','30 lb'],['🐧 Penguin','$16','4 lb']] }\n      ],\n      questions:[\n        { id:'d1q1', prompt:'What is the cost per serving for the jaguar?', answer:8, unit:'$ / serving', hint:'Batch cost \\u00f7 number of servings' },\n        { id:'d1q2', prompt:'What is the cost per serving for the penguin?', answer:2, unit:'$ / serving' },\n        { id:'d1q3', prompt:'How many servings do all 12 penguins need each day?', answer:36, unit:'servings' },\n        { id:'d1q4', prompt:'How many servings do all 3 elephants need each day?', answer:12, unit:'servings' },\n        { id:'d1q5', prompt:'What is the cost per pound of food for the penguin? (It costs the most per pound!)', answer:4, unit:'$ / lb' }\n      ] },\n\n    { id:'d2', dept:'Department 2', short:'Pay', icon:'💵', name:'Employee Pay / HR',\n      intro:'A great park needs a great team. Work out weekly pay, staffing ratios, and how new hires change payroll.',\n      tables:[\n        { title:'Staff Pay', headers:['Role','Pay / Hour','Hours / Week'],\n          rows:[['Zookeeper','$18','40'],['Manager','$32','40'],['Maintenance','$15','40'],['Veterinarian','$45','40']] },\n        { title:'Current Staff', headers:['Role','Number Employed'],\n          rows:[['Manager','2'],['Zookeeper','6'],['Maintenance','4']] }\n      ],\n      questions:[\n        { id:'d2q1', prompt:'How much does one zookeeper earn per week?', answer:720, unit:'$ / week', hint:'Hourly pay \\u00d7 hours per week' },\n        { id:'d2q2', prompt:'How much does one manager earn per week?', answer:1280, unit:'$ / week' },\n        { id:'d2q3', prompt:'Write the ratio of managers : zookeepers : maintenance workers in simplest form.', answer:'1:3:2', type:'ratio', unit:'(a:b:c)', hint:'Start with 2:6:4, then simplify' },\n        { id:'d2q4', prompt:'If you hire 3 more zookeepers, how much does your weekly payroll increase?', answer:2160, unit:'$ / week' }\n      ] },\n\n    { id:'d3', dept:'Department 3', short:'Tickets', icon:'🎟️', name:'Ticket Revenue',\n      intro:'It\\u2019s a busy Saturday at the gate! Use ticket prices and attendance to calculate revenue and visitor ratios.',\n      tables:[\n        { title:'Ticket Prices', headers:['Visitor Type','Price'],\n          rows:[['Adult','$24'],['Child','$14'],['Senior','$18'],['Member','$10']] },\n        { title:'Saturday Attendance', headers:['Visitor Type','Tickets Sold'],\n          rows:[['Adult','300'],['Child','450'],['Senior','120'],['Member','80']] }\n      ],\n      questions:[\n        { id:'d3q1', prompt:'What is the total revenue from adult tickets on Saturday?', answer:7200, unit:'$' },\n        { id:'d3q2', prompt:'What is the total revenue from child tickets?', answer:6300, unit:'$' },\n        { id:'d3q3', prompt:'What is the total ticket revenue for the whole day? (All 4 types)', answer:16460, unit:'$', hint:'Add the revenue from every visitor type' },\n        { id:'d3q4', prompt:'Write the ratio of adult tickets to child tickets in simplest form.', answer:'2:3', type:'ratio', unit:'(a:b)' }\n      ] },\n\n    { id:'d4', dept:'Department 4', short:'Care', icon:'🩺', name:'Animal Care & Health',\n      intro:'Feeding rule: every animal eats 3 lb of food per 100 lb of body weight. Medication rule: 5 mg of medicine per 1 kg of body weight.',\n      tables:[\n        { title:'Body Weights (Feeding)', headers:['Animal','Body Weight'],\n          rows:[['🐘 Elephant','12,000 lb'],['🐆 Jaguar','200 lb'],['🦒 Giraffe','1,800 lb']] },\n        { title:'Body Weights (Medication)', headers:['Animal','Body Weight'],\n          rows:[['🐆 Jaguar','80 kg'],['🦊 Red Panda','6 kg']] }\n      ],\n      questions:[\n        { id:'d4q1', prompt:'How many pounds of food does the elephant need per day?', answer:360, unit:'lb', hint:'Weight \\u00f7 100, then \\u00d7 3' },\n        { id:'d4q2', prompt:'How many pounds of food does the jaguar need per day?', answer:6, unit:'lb' },\n        { id:'d4q3', prompt:'What is the correct medication dose for the jaguar?', answer:400, unit:'mg', hint:'5 mg \\u00d7 body weight in kg' },\n        { id:'d4q4', prompt:'What is the correct medication dose for the red panda?', answer:30, unit:'mg' }\n      ] },\n\n    { id:'d5', dept:'Department 5', short:'Transport', icon:'🚚', name:'Transportation & Logistics',\n      intro:'Time to move some animals. Today\\u2019s transfer route is 240 miles, driven by the box truck. Find unit rates and scale up vehicle capacity.',\n      tables:[\n        { title:'Vehicle Costs', headers:['Vehicle','Trip Cost','Miles Driven'],\n          rows:[['🚚 Box Truck','$360','90 mi'],['🚐 Van','$150','75 mi']] },\n        { title:'Vehicle Capacity', headers:['Vehicle','Animals per Vehicle'],\n          rows:[['🚐 Van','4']] }\n      ],\n      questions:[\n        { id:'d5q1', prompt:'What is the cost per mile for the box truck?', answer:4, unit:'$ / mi', hint:'Trip cost \\u00f7 miles driven' },\n        { id:'d5q2', prompt:'What is the cost per mile for the van?', answer:2, unit:'$ / mi' },\n        { id:'d5q3', prompt:'What is the total cost of today\\u2019s 240-mile truck route?', answer:960, unit:'$' },\n        { id:'d5q4', prompt:'How many animals can 5 vans carry in total?', answer:20, unit:'animals' }\n      ] },\n\n    { id:'d6', dept:'Department 6', short:'Water', icon:'💧', name:'Water Usage',\n      intro:'Keep every habitat full! Water costs $0.02 per gallon. Use a 30-day month for monthly bills.',\n      tables:[\n        { title:'Weekly Water Use', headers:['Enclosure','Gallons per Week'],\n          rows:[['🐘 Elephant Habitat','4,200'],['🐧 Penguin Pool','1,400']] }\n      ],\n      questions:[\n        { id:'d6q1', prompt:'How many gallons per day does the elephant habitat use?', answer:600, unit:'gal / day', hint:'Weekly total \\u00f7 7' },\n        { id:'d6q2', prompt:'How many gallons per day does the penguin pool use?', answer:200, unit:'gal / day' },\n        { id:'d6q3', prompt:'What is the monthly water bill for the elephant habitat?', answer:360, unit:'$', hint:'Gallons/day \\u00d7 30 days \\u00d7 $0.02' },\n        { id:'d6q4', prompt:'What is the monthly water bill for the penguin pool?', answer:120, unit:'$' }\n      ] },\n\n    { id:'d7', dept:'Department 7', short:'Gift Shop', icon:'🎁', name:'Gift Shop',\n      intro:'Cha-ching! Figure out markup ratios and how much the gift shop earns per hour and per visitor.',\n      tables:[\n        { title:'Gift Shop Items', headers:['Item','Cost Price','Selling Price'],\n          rows:[['🧸 Plush Jaguar','$6','$18'],['👕 Park T-Shirt','$8','$20']] },\n        { title:'Saturday Sales', headers:['Measure','Amount'],\n          rows:[['Total Sales','$1,800'],['Hours Open','6'],['Visitors','600']] }\n      ],\n      questions:[\n        { id:'d7q1', prompt:'Write the markup ratio of selling price to cost price for the plush jaguar (simplest form).', answer:'3:1', type:'ratio', unit:'(sell:cost)', hint:'$18 to $6' },\n        { id:'d7q2', prompt:'Write the markup ratio of selling price to cost price for the t-shirt (simplest form).', answer:'5:2', type:'ratio', unit:'(sell:cost)' },\n        { id:'d7q3', prompt:'What is the gift shop\\u2019s revenue per hour on Saturday?', answer:300, unit:'$ / hour' },\n        { id:'d7q4', prompt:'How much does the gift shop earn per visitor?', answer:3, unit:'$ / visitor' }\n      ] },\n\n    { id:'d8', dept:'Department 8', short:'Marketing', icon:'📣', name:'Attendance & Marketing',\n      intro:'Spread the word and pack the park! Find average daily attendance, crowd ratios, and your advertising cost per visitor.',\n      tables:[\n        { title:'Seasonal Attendance', headers:['Season','Total Visitors','Days'],\n          rows:[['\\u2600\\ufe0f Summer','21,000','7'],['\\u2744\\ufe0f Winter','4,200','14']] },\n        { title:'Saturday Crowd', headers:['Group','Count'],\n          rows:[['Kids','450'],['Adults','300']] },\n        { title:'Advertising', headers:['Measure','Amount'],\n          rows:[['Ad Spending','$4,000'],['New Visitors','800']] }\n      ],\n      questions:[\n        { id:'d8q1', prompt:'What is the average number of visitors per day in summer?', answer:3000, unit:'visitors / day', hint:'Total \\u00f7 days' },\n        { id:'d8q2', prompt:'What is the average number of visitors per day in winter?', answer:300, unit:'visitors / day' },\n        { id:'d8q3', prompt:'Write the ratio of kids to adults in Saturday\\u2019s crowd (simplest form).', answer:'3:2', type:'ratio', unit:'(a:b)' },\n        { id:'d8q4', prompt:'What is the advertising cost per new visitor?', answer:5, unit:'$ / visitor' }\n      ] }\n  ];\n\n  componentDidMount(){\n    try {\n      const saved = JSON.parse(localStorage.getItem('furreal-zoo') || 'null');\n      if (saved && typeof saved === 'object') {\n        this.setState({ answers: saved.answers || {}, status: saved.status || {} });\n      }\n    } catch(e){}\n  }\n\n  persist(answers, status){\n    try { localStorage.setItem('furreal-zoo', JSON.stringify({ answers, status })); } catch(e){}\n  }\n\n  qmap(){\n    const m = {};\n    this.depts.forEach(d => d.questions.forEach(q => { m[q.id] = q; }));\n    return m;\n  }\n\n  gcd(a,b){ a=Math.abs(Math.round(a)); b=Math.abs(Math.round(b)); while(b){ const t=b; b=a%b; a=t; } return a||1; }\n\n  normRatio(str){\n    str = String(str).replace(/\\s/g,'');\n    const parts = str.split(':');\n    if (parts.length < 2) return null;\n    const nums = parts.map(p => parseFloat(p));\n    if (nums.some(n => isNaN(n))) return null;\n    let g = 0; nums.forEach(n => { g = this.gcd(g, n); });\n    if (!g) return null;\n    return nums.map(n => Math.round(n)/g).join(':');\n  }\n\n  parseNum(str){\n    str = String(str).replace(/[^0-9./-]/g,'');\n    if (!str) return null;\n    if (str.indexOf('/') !== -1){ const p = str.split('/').map(Number); return p[1] ? p[0]/p[1] : null; }\n    const n = Number(str); return isNaN(n) ? null : n;\n  }\n\n  setTab(t){ this.setState({ tab: t }); }\n\n  setAnswer(id, v){\n    this.setState(s => {\n      const answers = { ...s.answers, [id]: v };\n      const status = { ...s.status }; delete status[id];\n      this.persist(answers, status);\n      return { answers, status };\n    });\n  }\n\n  check(id){\n    const q = this.qmap()[id]; if (!q) return;\n    const raw = String(this.state.answers[id] ?? '').trim(); if (!raw) return;\n    let ok = false;\n    if (q.type === 'ratio'){\n      const a = this.normRatio(raw), b = this.normRatio(q.answer);\n      ok = !!a && a === b;\n    } else {\n      const v = this.parseNum(raw);\n      ok = v !== null && Math.abs(v - q.answer) <= (q.tol ?? 0.001);\n    }\n    this.setState(s => {\n      const status = { ...s.status, [id]: ok ? 'correct' : 'wrong' };\n      this.persist(s.answers, status);\n      return { status };\n    });\n  }\n\n  clearDept(deptId){\n    this.setState(s => {\n      const answers = { ...s.answers }, status = { ...s.status };\n      const d = this.depts.find(x => x.id === deptId);\n      d.questions.forEach(q => { delete answers[q.id]; delete status[q.id]; });\n      this.persist(answers, status);\n      return { answers, status };\n    });\n  }\n\n  renderVals(){\n    const tab = this.state.tab;\n    const tabStyle = (active) => 'cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;font-size:14px;font-weight:800;padding:8px 14px;border-radius:22px;border:2px solid ' +\n      (active ? '#21503a' : '#d8c9a6') + ';background:' + (active ? '#21503a' : '#fffdf6') + ';color:' + (active ? '#fffaf0' : '#5a4f3a') + ';';\n\n    const tabs = [{ id:'welcome', label:'Start Here', icon:'🏠' }]\n      .concat(this.depts.map(d => ({ id:d.id, label:d.short, icon:d.icon })))\n      .concat([{ id:'wrapup', label:'Wrap-Up', icon:'🏆' }])\n      .map(t => ({ ...t, style: tabStyle(t.id === tab), onClick: () => this.setTab(t.id) }));\n\n    const depts = this.depts.map(d => ({ short:d.short, icon:d.icon, dept:d.dept, onClick: () => this.setTab(d.id) }));\n\n    const d = this.depts.find(x => x.id === tab) || null;\n    let activeDept = null;\n    if (d){\n      const questions = d.questions.map((q, i) => {\n        const st = this.state.status[q.id] || '';\n        return {\n          id:q.id, num:i+1, prompt:q.prompt, unit:q.unit || '', hint:q.hint || '',\n          value: this.state.answers[q.id] ?? '',\n          isCorrect: st === 'correct', isWrong: st === 'wrong',\n          onChange: (e) => this.setAnswer(q.id, e.target.value),\n          onKey: (e) => { if (e.key === 'Enter') this.check(q.id); },\n          onCheck: () => this.check(q.id)\n        };\n      });\n      const correct = questions.filter(q => q.isCorrect).length;\n      const photoHints = {\n        d1:'Drop a photo of animals eating 🍃',\n        d2:'Drop a photo of zoo staff 👷',\n        d3:'Drop a photo of the zoo entrance 🎟️',\n        d4:'Drop an animal-care or vet photo 🩺',\n        d5:'Drop a transport / truck photo 🚚',\n        d6:'Drop a water-habitat photo 💦',\n        d7:'Drop a gift-shop photo 🧸',\n        d8:'Drop a busy-crowd photo 👨‍👩‍👧‍👦'\n      };\n      const h = React.createElement;\n      const thS = { textAlign:'left', padding:'8px 14px', background:'#eef5ea', color:'#21503a', fontWeight:800, borderBottom:'2px solid #d8c9a6', fontSize:'12.5px', letterSpacing:'.3px', textTransform:'uppercase' };\n      const tdS = { padding:'9px 14px', borderBottom:'1px solid #ece3cf', fontWeight:600 };\n      const tablesEl = h('div', { style:{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(260px,1fr))', gap:'16px' } },\n        d.tables.map((tb, ti) => h('div', { key:ti, style:{ background:'#fffdf6', border:'2px solid #d8c9a6', borderRadius:'14px', overflow:'hidden', boxShadow:'0 4px 0 #d8c9a6' } },\n          h('div', { style:{ background:'#21503a', color:'#fffaf0', fontFamily:\"'Fredoka',sans-serif\", fontWeight:600, fontSize:'15px', padding:'10px 14px' } }, '📊 ' + tb.title),\n          h('table', { style:{ width:'100%', borderCollapse:'collapse', fontSize:'14.5px' } },\n            h('thead', null, h('tr', null, tb.headers.map((hd, hi) => h('th', { key:hi, style:thS }, hd)))),\n            h('tbody', null, tb.rows.map((r, ri) => h('tr', { key:ri }, r.map((c, ci) => h('td', { key:ci, style:tdS }, c)))))\n          )\n        ))\n      );\n      activeDept = {\n        id:d.id, name:d.name, icon:d.icon, dept:d.dept, intro:d.intro,\n        tablesEl,\n        questions,\n        photoId: 'photo-' + d.id, photoHint: photoHints[d.id] || 'Drop a photo here',\n        progress: correct + ' / ' + questions.length + ' correct',\n        onClear: () => this.clearDept(d.id)\n      };\n    }\n\n    return {\n      tabs, depts,\n      showWelcome: tab === 'welcome',\n      showWrap: tab === 'wrapup',\n      showDept: !!d,\n      activeDept\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
